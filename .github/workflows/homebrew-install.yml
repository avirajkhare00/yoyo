name: Homebrew Install Check

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_run:
    workflows: ["Release yoyo binary"]
    types: [completed]

env:
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  HOMEBREW_NO_INSTALL_FROM_API: "1"

jobs:
  template-install:
    if: github.event_name != 'workflow_run'
    name: Homebrew install (template / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel]

    env:
      FORMULA_PATH: packaging/homebrew/yoyo.rb.template

    steps:
      - name: Checkout yoyo
        uses: actions/checkout@v4

      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Show Homebrew version
        shell: bash
        run: brew --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-homebrew-install-${{ hashFiles('**/Cargo.lock', 'packaging/onnxruntime/assets.json') }}
          restore-keys: ${{ runner.os }}-homebrew-install-

      - name: Prepare reusable ONNX Runtime libs
        if: runner.os == 'macOS' && runner.arch == 'X64'
        env:
          ORT_ASSET_WAIT_ATTEMPTS: "40"
          ORT_ASSET_WAIT_SECONDS: "30"
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/use-onnxruntime-asset.sh x86_64-apple-darwin

      - name: Build native release archive
        shell: bash
        run: |
          set -euo pipefail

          case "${RUNNER_OS}/${RUNNER_ARCH}" in
            Linux/X64)
              target="x86_64-unknown-linux-gnu"
              ;;
            macOS/ARM64)
              target="aarch64-apple-darwin"
              ;;
            macOS/X64)
              target="x86_64-apple-darwin"
              ;;
            *)
              echo "Unsupported runner ${RUNNER_OS}/${RUNNER_ARCH}" >&2
              exit 1
              ;;
          esac

          echo "target=$target" >> "$GITHUB_ENV"

          cargo build --release --target "$target"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --force --deep --sign - "target/$target/release/yoyo"
          fi

          mkdir -p dist
          cp "target/$target/release/yoyo" "dist/yoyo-$target"
          tar -C dist -czf "dist/yoyo-$target.tar.gz" "yoyo-$target"

      - name: Render formula under test
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          archive_path="$(pwd)/dist/yoyo-${target}.tar.gz"
          archive_url="file://${archive_path}"
          sha="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"

          case "$target" in
            aarch64-apple-darwin)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-aarch64-apple-darwin.tar.gz'
              ;;
            x86_64-apple-darwin)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-x86_64-apple-darwin.tar.gz'
              ;;
            x86_64-unknown-linux-gnu)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-x86_64-unknown-linux-gnu.tar.gz'
              ;;
            *)
              echo "Unsupported target ${target}" >&2
              exit 1
              ;;
          esac

          dummy_sha="$(printf '0%.0s' {1..64})"
          cp "${FORMULA_PATH}" dist/yoyo.rb

          VERSION="$version" \
          TARGET_URL="$target_url" \
          ARCHIVE_URL="$archive_url" \
          SHA="$sha" \
          DUMMY_SHA="$dummy_sha" \
          perl -0pi -e '
            s/__VERSION__/$ENV{VERSION}/g;
            s/__SHA_MACOS__/$ENV{DUMMY_SHA}/g;
            s/__SHA_MACOS_ARM__/$ENV{DUMMY_SHA}/g;
            s/__SHA_MACOS_INTEL__/$ENV{DUMMY_SHA}/g;
            s/__SHA_LINUX__/$ENV{DUMMY_SHA}/g;
            s/^(\s*version\s+)".*"$/\1"$ENV{VERSION}"/m;
            s/sha256\s+"[^"]+"/sha256 "$ENV{DUMMY_SHA}"/g;
            my $target_url = quotemeta($ENV{TARGET_URL});
            my $archive_url = $ENV{ARCHIVE_URL};
            s/url "$target_url"/url "$archive_url"/g;
            my $archive_re = quotemeta($ENV{ARCHIVE_URL});
            s/(url "$archive_re"\n(\s*)sha256 ")[^"]+(")/$1.$ENV{SHA}.$3/ge;
          ' dist/yoyo.rb

          grep -Fq "$archive_url" dist/yoyo.rb
          grep -Fq "$sha" dist/yoyo.rb

      - name: Install formula with Homebrew
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/install-homebrew-formula.sh dist/yoyo.rb

  tap-install:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    name: Homebrew install (tap / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15-intel]

    env:
      FORMULA_PATH: homebrew-yoyo/Formula/yoyo.rb

    steps:
      - name: Checkout yoyo
        uses: actions/checkout@v4

      - name: Checkout homebrew-yoyo
        uses: actions/checkout@v4
        with:
          repository: avirajkhare00/homebrew-yoyo
          path: homebrew-yoyo

      - name: Install Homebrew (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Show Homebrew version
        shell: bash
        run: brew --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-homebrew-install-${{ hashFiles('**/Cargo.lock', 'packaging/onnxruntime/assets.json') }}
          restore-keys: ${{ runner.os }}-homebrew-install-

      - name: Prepare reusable ONNX Runtime libs
        if: runner.os == 'macOS' && runner.arch == 'X64'
        env:
          ORT_ASSET_WAIT_ATTEMPTS: "40"
          ORT_ASSET_WAIT_SECONDS: "30"
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/use-onnxruntime-asset.sh x86_64-apple-darwin

      - name: Build native release archive
        shell: bash
        run: |
          set -euo pipefail

          case "${RUNNER_OS}/${RUNNER_ARCH}" in
            Linux/X64)
              target="x86_64-unknown-linux-gnu"
              ;;
            macOS/ARM64)
              target="aarch64-apple-darwin"
              ;;
            macOS/X64)
              target="x86_64-apple-darwin"
              ;;
            *)
              echo "Unsupported runner ${RUNNER_OS}/${RUNNER_ARCH}" >&2
              exit 1
              ;;
          esac

          echo "target=$target" >> "$GITHUB_ENV"

          cargo build --release --target "$target"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            codesign --force --deep --sign - "target/$target/release/yoyo"
          fi

          mkdir -p dist
          cp "target/$target/release/yoyo" "dist/yoyo-$target"
          tar -C dist -czf "dist/yoyo-$target.tar.gz" "yoyo-$target"

      - name: Render formula under test
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          archive_path="$(pwd)/dist/yoyo-${target}.tar.gz"
          archive_url="file://${archive_path}"
          sha="$(shasum -a 256 "${archive_path}" | awk '{print $1}')"

          case "$target" in
            aarch64-apple-darwin)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-aarch64-apple-darwin.tar.gz'
              ;;
            x86_64-apple-darwin)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-x86_64-apple-darwin.tar.gz'
              ;;
            x86_64-unknown-linux-gnu)
              target_url='https://github.com/avirajkhare00/yoyo/releases/download/v#{version}/yoyo-x86_64-unknown-linux-gnu.tar.gz'
              ;;
            *)
              echo "Unsupported target ${target}" >&2
              exit 1
              ;;
          esac

          dummy_sha="$(printf '0%.0s' {1..64})"
          cp "${FORMULA_PATH}" dist/yoyo.rb

          VERSION="$version" \
          TARGET_URL="$target_url" \
          ARCHIVE_URL="$archive_url" \
          SHA="$sha" \
          DUMMY_SHA="$dummy_sha" \
          perl -0pi -e '
            s/__VERSION__/$ENV{VERSION}/g;
            s/__SHA_MACOS__/$ENV{DUMMY_SHA}/g;
            s/__SHA_MACOS_ARM__/$ENV{DUMMY_SHA}/g;
            s/__SHA_MACOS_INTEL__/$ENV{DUMMY_SHA}/g;
            s/__SHA_LINUX__/$ENV{DUMMY_SHA}/g;
            s/^(\s*version\s+)".*"$/\1"$ENV{VERSION}"/m;
            s/sha256\s+"[^"]+"/sha256 "$ENV{DUMMY_SHA}"/g;
            my $target_url = quotemeta($ENV{TARGET_URL});
            my $archive_url = $ENV{ARCHIVE_URL};

name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.14.1
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            ARCH="x86_64"
            EXT="tar.xz"
            URL="https://ziglang.org/download/0.14.1/zig-linux-${ARCH}-0.14.1.${EXT}"
          else
            ARCH="aarch64"
            EXT="tar.xz"
            URL="https://ziglang.org/download/0.14.1/zig-macos-${ARCH}-0.14.1.${EXT}"
          fi
          curl -fsSL "$URL" | tar -xJ
          echo "$PWD/zig-"*"/" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

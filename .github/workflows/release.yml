name: Release yoyo binary

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to a file to avoid quoting issues in the env var
          echo "$NOTES" > /tmp/release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: /tmp/release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build and upload binary (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: yoyo
            archive: yoyo-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: yoyo
            archive: yoyo-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (macOS ad-hoc)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}-${{ matrix.target }}
          tar -C dist -czf ${{ matrix.archive }} ${{ matrix.binary }}-${{ matrix.target }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew formula
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yoyo source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute SHA256 for macOS tarball
        id: sha_macos
        run: |
          sha=$(curl -sL https://github.com/avirajkhare00/yoyo/releases/download/${{ github.ref_name }}/yoyo-aarch64-apple-darwin.tar.gz | shasum -a 256 | awk '{print $1}')
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Compute SHA256 for Linux tarball
        id: sha_linux
        run: |
          sha=$(curl -sL https://github.com/avirajkhare00/yoyo/releases/download/${{ github.ref_name }}/yoyo-x86_64-unknown-linux-gnu.tar.gz | shasum -a 256 | awk '{print $1}')
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-yoyo
        uses: actions/checkout@v4
        with:
          repository: avirajkhare00/homebrew-yoyo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-yoyo

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_MACOS="${{ steps.sha_macos.outputs.sha }}"
          SHA_LINUX="${{ steps.sha_linux.outputs.sha }}"
          export VERSION SHA_MACOS SHA_LINUX
          python3 - <<'PY'
          import os
          from pathlib import Path

          template = Path("source/packaging/homebrew/yoyo.rb.template").read_text()
          rendered = (
              template.replace("__VERSION__", os.environ["VERSION"])
              .replace("__SHA_MACOS__", os.environ["SHA_MACOS"])
              .replace("__SHA_LINUX__", os.environ["SHA_LINUX"])
          )
          Path("homebrew-yoyo/Formula/yoyo.rb").write_text(rendered)
          PY

      - name: Commit and push formula update
        run: |
          cd homebrew-yoyo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yoyo.rb
          git commit -m "chore: update yoyo to v${{ steps.version.outputs.version }}"
          git push
